version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dam_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dam_db}
      POSTGRES_USER: ${DB_USER:-dam_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dam_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: dam_app
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres_data: